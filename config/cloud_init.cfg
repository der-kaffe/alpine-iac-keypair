#cloud-config
hostname: ${hostname}
fqdn: ${fqdn}
manage_etc_hosts: true

disable_root: true

package_update: true
packages:
  - sudo

chpasswd:
  list: |
    sysadmin:alpine
  expire: False

write_files:
  - path: /etc/ssh/sshd_config.d/99-security.conf
    owner: root:root
    permissions: '0644'
    content: |
      PasswordAuthentication yes
      PermitRootLogin no
      PubkeyAuthentication yes
      X11Forwarding no
  - path: /tmp/authorized_keys
    owner: root:root
    permissions: '0600'
    content: |
      ${ssh_key}

runcmd:
  - chmod 600 /etc/ssh/sshd_config.d/99-security.conf
  - adduser -D -s /bin/ash sysadmin 2>/dev/null || true
  - adduser sysadmin wheel 2>/dev/null || true
  - echo "sysadmin:alpine" | chpasswd 2>/dev/null || true
  - mkdir -p /home/sysadmin/.ssh
  - cp /tmp/authorized_keys /home/sysadmin/.ssh/authorized_keys
  - chown -R sysadmin:sysadmin /home/sysadmin/.ssh
  - chmod 700 /home/sysadmin/.ssh
  - chmod 600 /home/sysadmin/.ssh/authorized_keys
  - echo "sysadmin ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers.d/sysadmin
  - chmod 440 /etc/sudoers.d/sysadmin
  - service sshd restart || systemctl restart sshd || rc-service sshd restart
